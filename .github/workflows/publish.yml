name: Publish packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish with --dry-run"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn build
      - name: Publish @mail-reacher packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && '--dry-run' || '' }}
        run: |
          if [ -z "$DRY_RUN" ]; then
            test -n "$NODE_AUTH_TOKEN" || (echo "Missing NPM_TOKEN repository secret" && exit 1)
          fi
          publish_package() {
            local dir="$1"
            local name version
            name="$(node -p "require('./${dir}/package.json').name")"
            version="$(node -p "require('./${dir}/package.json').version")"

            if [ -z "$DRY_RUN" ] && npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "${name}@${version} is already published; skipping."
              return 0
            fi

            npm publish "./${dir}" --access public $DRY_RUN
          }

          publish_package packages/sdk
          publish_package packages/next
          publish_package packages/nodemailer
          publish_package packages/tanstack-start
